name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint (strict)
        run: swiftlint lint --strict

  test:
    name: Build & Test
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Pick iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available \
            | grep -oE "iPhone 1[6-9] Pro|iPhone 1[6-9]" \
            | head -1)
          echo "Chosen: $NAME"
          echo "device=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild \
            -project NeuroRune.xcodeproj \
            -scheme NeuroRune \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -only-testing:NeuroRuneTests \
            -skipMacroValidation \
            test \
            | xcbeautify --renderer github-actions
        env:
          NSUnbufferedIO: YES
