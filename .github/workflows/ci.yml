name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint (strict)
        run: swiftlint lint --strict

  test:
    name: Build & Test
    runs-on: macos-15
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # TCA Perception/Composable 매크로 신뢰 프롬프트 hang 방지.
      - name: Disable macro validation prompts
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Pick iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available \
            | grep -oE "iPhone 1[6-9] Pro|iPhone 1[6-9]" \
            | head -1)
          echo "Chosen: $NAME"
          echo "device=$NAME" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild \
            -project NeuroRune.xcodeproj \
            -scheme NeuroRune \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -only-testing:NeuroRuneTests \
            -parallel-testing-enabled NO \
            -skipMacroValidation \
            test \
            | xcbeautify --renderer github-actions
        env:
          NSUnbufferedIO: YES

      # 콜드 스타트 시 첫 UI 테스트가 background assertion 타임아웃으로 실패.
      # bootstatus -b로 부팅 완료까지 블록해서 시뮬레이터 비용을 테스트 밖으로 빼낸다.
      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.device }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.device }}" -b

      - name: Run UI Smoke Tests
        run: |
          set -o pipefail
          xcodebuild \
            -project NeuroRune.xcodeproj \
            -scheme NeuroRune \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -only-testing:NeuroRuneUITests \
            -parallel-testing-enabled NO \
            -skipMacroValidation \
            test \
            | xcbeautify --renderer github-actions
        env:
          NSUnbufferedIO: YES
